<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frase Aleatoria</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .contenedor {
        background: white;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        margin-bottom: 20px;
    }

    #frase {
        font-size: 18px;
        margin: 20px 0;
        color: #333;
        min-height: 40px;
    }

    button {
        background: #4facfe;
        border: none;
        color: white;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2f80ed;
    }
</style>
</head>

<body>

<div class="contenedor">
    <h1>Generador de Frases</h1>

    <p id="frase">Pulsa el botón para ver una frase.</p>
    <form action="" method="post">
        <button submit="generarFrase()" name="random">Nueva frase</button>
    </form>
    <p>Frase: {{fraseRandom}}</p>
</div>



</body>
</html>
