<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas Json</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --color-primary: #4CAF50;
            --color-danger: #f44336;
            --color-text: #333;
            --color-light: #f8f9fa;
            --color-border: #ddd;
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-light);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1,
        h2,
        h3 {
            color: #222;
            margin-top: 0;
        }

        h3 {
            margin: 1.5rem 0 0.6rem;
        }

        form {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        button,
        a.button-like {
            display: inline-block;
            padding: 0.6rem 1.3rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.15s;
        }

        button {
            background: var(--color-primary);
            color: white;
        }

        button:hover {
            background: #43a047;
        }

        a[href*="editar"] {
            color: #1976d2;
            text-decoration: none;
            margin-right: 1rem;
        }

        a[href*="borrar"] {
            color: var(--color-danger);
            text-decoration: none;
        }

        a[href*="editar"]:hover,
        a[href*="borrar"]:hover {
            text-decoration: underline;
        }

        .actions {
            margin-top: 1.2rem;
        }

        .nota {
            background: white;
            padding: 1.2rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            border-left: 4px solid #1976d2;
        }

        .nota p {
            margin: 0.8rem 0;
            white-space: pre-wrap;
        }
    </style>    

</head>

<body>
    {% block content %}
    {% endblock %}


</body>

</html>
