{% extends "base.html" %}

{% block content %}

<form method="POST">
    <input type="text" name="titulo">
    <textarea name="contenido"></textarea>
    <button type="submit">Guardar</button>
</form>

{% for nota in notas %}

<h3>{{ nota.titulo }}</h3>
<p>{{ nota.contenido }}</p>
<a href="{{ url_for('editar', id=nota.id) }}">Editar</a>
<a href="{{ url_for('borrar', id=nota.id) }}">Borrar</a>

{% endfor %}

{% endblock %}
