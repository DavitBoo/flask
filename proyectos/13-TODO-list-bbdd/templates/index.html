<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-delete { color: red; text-decoration: none; font-weight: bold; }
        input[type="text"] { width: 70%; padding: 8px; }
        button { padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mis Tareas</h2>

    <form action="{{ url_for('crear') }}" method="POST">
        <input type="text" name="title" placeholder="Nueva tarea..." required>
        <button type="submit">Agregar</button>
    </form>

    <hr>

    <ul>
        {% for tarea in tareas %}
        <li>
            <span>{{ tarea.titulo }}</span>
            <a href="{{ url_for('eliminar', id=tarea.id) }}" class="btn-delete">X</a>
        </li>
        {% else %}
        <li>No hay tareas pendientes 🎉</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
