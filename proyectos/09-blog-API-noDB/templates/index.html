{% extends "base.html" %}

{% block title %}Mis Blog - Inicio{% endblock %}

{% block content %}

    <h1>✨ Mis Blog</h1>

    <div class="lista-articulos">
        {% if posts %}
            <ul>
                {% for post in posts %}
                <li>
                    <a href="{{ url_for('post', id=post.id) }}">{{ post.titulo }}</a>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <div class="empty">
                <p>Aún no tienes artículos en tu blog... ¡empieza ya! 🚀</p>
            </div>
        {% endif %}
    </div>

{% endblock %}
