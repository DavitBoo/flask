{% extends "base.html" %}

{% block content %}

<h2>Editar nota</h2>

<form method="POST">
    <div style="margin-bottom: 1rem;">
        <label for="titulo">Título:</label><br>
        <input 
            type="text" 
            id="titulo" 
            name="titulo" 
            value="{{ nota.titulo | e }}" 
            required 
            style="width: 100%; max-width: 600px; padding: 0.5rem;"
        >
    </div>

    <div style="margin-bottom: 1rem;">
        <label for="contenido">Contenido:</label><br>
        <textarea 
            id="contenido" 
            name="contenido" 
            rows="10" 
            required 
            style="width: 100%; max-width: 600px; padding: 0.5rem; font-family: inherit;"
        >{{ nota.contenido | e }}</textarea>
    </div>

    <div style="margin-top: 1.5rem;">
        <button type="submit" style="padding: 0.6rem 1.2rem; background: #4CAF50; color: white; border: none; cursor: pointer;">
            Guardar cambios
        </button>
        
        <a href="{{ url_for('index') }}" 
           style="margin-left: 1rem; padding: 0.6rem 1.2rem; background: #f44336; color: white; text-decoration: none; border-radius: 4px;">
            Cancelar
        </a>
    </div>
</form>

{% endblock %}
